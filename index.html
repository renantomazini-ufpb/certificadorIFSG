<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #03143b;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    .certificado {
      background: #ceffe4;
      color: #000;
      padding: 40px;
      border-radius: 10px;
      max-width: 800px;
      margin: 20px auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    .assinatura {
      margin-top: 40px;
    }

    .assinatura img {
      width: 150px;
    }

    .botoes {
      margin-top: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

  .twitter { background: #000000; color: white; }
  .mastodon { background: #6364FF; color: white; } 
  .bluesky { background: #0085FF; color: white; }

  /* Instâncias */
  .bantu { background: #FF6B00; color: white; }        
  .colorides { background: #FF4FC3; color: white; }   
  .capivarinha { background: #8B5A2B; color: white; } 
  .organica { background: #2ECC71; color: white; }    
  .bolhaone { background: #00C2FF; color: white; }    
  .ursal { background: #A52A2A; color: white; }       
  .masto { background: #7A5CFF; color: white; }       
  .arram { background: #FF0033; color: white; } 
  .bolhaus { background: #0099CC; color: white; }     
  .burnthistown { background: #FF4500; color: white; } 
  .bertha { background: #6A0DAD; color: white; }


    .topo {
  position: relative;
  height: 220px;
  margin-bottom: 20px;
        }

        .logo {
        position: absolute;
        top: 0;
        width: 120px;
        }

        .esquerda {
        left: 0;
        }

        .direita {
        right: 0;
        }
  </style>
</head>

<body>

<h1>Gerando certificado...</h1>

<div id="certificado" class="certificado" style="display:none;"></div>
<p>Compartilhe seu resultado e desafie pessoas!</p>
<div class="botoes" id="share" style="display:none;">
  <button class="mastodon" onclick="shareMastodonInstance('https://mastodon.com.br')">Mastodon.br</button>
  <button class="bluesky" onclick="shareBluesky()">Bluesky</button>
  <button class="twitter" onclick="shareTwitter()">Twitter</button>
  <button class="bantu" onclick="shareMastodonInstance('https://bantu.social')">Bantu.social</button>
  <button class="colorides" onclick="shareMastodonInstance('https://colorid.es')">Colorid.es</button>
  <button class="capivarinha" onclick="shareMastodonInstance('https://capivarinha.club')">Capivarinha.club</button>
  <button class="organica" onclick="shareMastodonInstance('https://organica.social')">Organica.social</button>
  <button class="bolhaone" onclick="shareMastodonInstance('https://bolha.one')">Bolha.one</button>
  <button class="ursal" onclick="shareMastodonInstance('https://ursal.zone')">Ursal.zone</button>
  <button class="masto" onclick="shareMastodonInstance('https://masto.donte.com.br')">masto.donte.com.br</button>
  <button class="arram" onclick="shareMastodonInstance('https://arram.senta-la.cloud')">arram.senta-la.cloud</button>
  <button class="bolhaus" onclick="shareMastodonInstance('https://bolha.us')">Bolha.us</button>
  <button class="burnthistown" onclick="shareMastodonInstance('https://burnthistown.social')">burnthistown</button>
  <button class="bertha" onclick="shareMastodonInstance('https://bertha.social')">bertha.social</button>
</div>

<script>
  function getParametro(nome) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(nome);
  }

  function classificarTempo(segundos) {
    if (segundos < 124) return "Distinção Máxima!!!";
    if (segundos < 166) return "Louvor!";
    if (segundos < 200) return "Aprovação!";
    if (segundos < 280) return "Satisfação!";
    if (segundos < 380) return "aceitabilidade!";
    if (segundos < 620) return "passabilidade!";
    if (segundos < 800) return "receio!";
    return "medo";
  }

  function gerarCertificado() {
    const tempo = parseInt(getParametro("tempo")) || 999;
    const nome = prompt("Digite seu nome:");

    if (!nome) {
      alert("Nome é obrigatório!");
      return;
    }

    const classificacao = classificarTempo(tempo);

    const texto = `
    <div class="topo">
        <img src="assets/logo1.png" class="logo esquerda">
        <img src="assets/logo2.png" class="logo direita">
    </div>


    <h2>Certificado Oficial</h2>

    <p>
        Instituto Federal Suvaco do Guaxinim(IFSG) em Parceria com a Extreme GoHorse certificam que
        <strong>${nome}</strong>
        completou a maratona de suporte ao usuário em
        <strong>${tempo} segundos</strong>.
    </p>

    <p>
        Sendo considerado apto para trabalho em suporte com:
        <strong>${classificacao}</strong>
    </p>

    <div class="assinatura">
        <p>Assinatura:</p>
        <img src="assets/assinatura.png" alt="assinatura">
    </div>
    `;

    document.getElementById("certificado").innerHTML = texto;
    document.getElementById("certificado").style.display = "block";
    document.getElementById("share").style.display = "block";

    window.certificadoTexto = `Eu completei a maratona de suporte em ${tempo}s e consegui ${classificacao}! #certificadoSuporteGoHorse #joguinho #suporteCompeTItivo `;
  }

  function shareTwitter() {
    const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(window.certificadoTexto)}`;
    window.open(url, "_blank");
  }

  function shareMastodonInstance(baseUrl) {
    const url = `${baseUrl}/share?text=${encodeURIComponent(window.certificadoTexto)}`;
    window.open(url, "_blank");
  }
  function shareBluesky() {
    const url = `https://bsky.app/intent/compose?text=${encodeURIComponent(window.certificadoTexto)}`;
    window.open(url, "_blank");
  }

  gerarCertificado();
</script>

</body>
</html>
